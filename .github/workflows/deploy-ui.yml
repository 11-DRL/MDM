name: Deploy MDM Stewardship UI

on:
  push:
    branches: [main]
    paths:
      - 'stewardship-ui/**'
  pull_request:
    branches: [main]
    paths:
      - 'stewardship-ui/**'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: stewardship-ui/package-lock.json

      - name: Install dependencies
        working-directory: stewardship-ui
        run: npm ci

      - name: Build
        working-directory: stewardship-ui
        env:
          # Zmienne wstrzykiwane przez GitHub Secrets (Settings → Secrets)
          VITE_WRITE_API_URL:       ${{ secrets.VITE_WRITE_API_URL }}
          VITE_TENANT_ID:           ${{ secrets.VITE_TENANT_ID }}
          VITE_CLIENT_ID:           ${{ secrets.VITE_CLIENT_ID }}
          VITE_MOCK_MODE:           "false"
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: 'stewardship-ui'
          output_location: 'dist'
          skip_app_build: true   # już zbudowane powyżej (z secrets)
