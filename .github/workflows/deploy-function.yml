name: Deploy MDM Azure Function

on:
  push:
    branches: [main]
    paths:
      - 'azure-function/**'
      - '.github/workflows/deploy-function.yml'
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: func-mdm-stewardship
  AZURE_FUNCTIONAPP_PACKAGE_PATH: azure-function
  NODE_VERSION: '20.x'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy Function

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/package-lock.json

      - name: Install dependencies and build
        working-directory: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
        run: |
          npm ci
          npm run build
          # Prune dev deps before deployment to shrink artifact
          npm prune --omit=dev

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
